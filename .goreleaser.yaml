version: 2

project_name: kubectl-tessera

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-tessera
    main: ./cmd/kubectl-tessera
    binary: kubectl-tessera
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: kubectl-tessera
    ids:
      - kubectl-tessera
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

krews:
  - name: tessera
    ids:
      - kubectl-tessera
    homepage: "https://github.com/wagneripjr/kubectl-tessera"
    description: |-
      Mint short-lived, least-privilege kubeconfigs scoped to a single
      ServiceAccount. kubectl-tessera creates a temporary identity, grants
      exactly the RBAC you ask for, prints a ready-to-use kubeconfig, and
      garbage-collects the identity when its lease expires — so you can hand
      out narrowly scoped cluster access without sharing admin credentials.
    short_description: "Mint short-lived, least-privilege scoped kubeconfigs"
    # Generate the manifest only; the krew-index PR is owned by the
    # krew-release-bot job (ADR-012). `auto` would try to push to an
    # unset repository on a real tag → GET /repos// 404 → release fails.
    skip_upload: true

release:
  github:
    owner: wagneripjr
    name: kubectl-tessera

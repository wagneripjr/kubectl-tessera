version: 2

project_name: kubectl-tessera

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-tessera
    main: ./cmd/kubectl-tessera
    binary: kubectl-tessera
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: kubectl-tessera
    ids:
      - kubectl-tessera
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  github:
    owner: wagneripjr
    name: kubectl-tessera

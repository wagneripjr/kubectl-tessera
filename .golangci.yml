version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - gosec
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: internal/subshell/subshell\.go
        text: G204
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/wagneripjr/kubectl-tessera

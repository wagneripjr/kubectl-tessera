apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tessera
spec:
  version: {{ .TagName }}
  homepage: https://github.com/wagneripjr/kubectl-tessera
  shortDescription: Mint short-lived, least-privilege kubeconfigs
  description: |-
    Mint short-lived, least-privilege kubeconfigs scoped to a single
    ServiceAccount. kubectl-tessera creates a temporary identity, grants
    exactly the RBAC you ask for, prints a ready-to-use kubeconfig, and
    garbage-collects the identity when its lease expires — so you can hand
    out narrowly scoped cluster access without sharing admin credentials.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-tessera
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-tessera
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-tessera
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-tessera
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_windows_amd64.zip" .TagName }}
    bin: kubectl-tessera.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    {{addURIAndSha "https://github.com/wagneripjr/kubectl-tessera/releases/download/{{ .TagName }}/kubectl-tessera_{{ .TagName }}_windows_arm64.zip" .TagName }}
    bin: kubectl-tessera.exe

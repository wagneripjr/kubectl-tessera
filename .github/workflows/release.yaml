name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  krew:
    name: Update krew-index
    runs-on: ubuntu-latest
    needs: goreleaser
    # Disabled until tessera is accepted into krew-index. The FIRST submission must be a
    # manual PR by the author: the bot can open it, but krew maintainers auto-close a
    # bot-authored first submission (you can't push review fixes to a bot PR) — observed on
    # krew-index#5917 for v0.1.2. Once the manual PR merges, flip this to `true`; the bot then
    # opens version-bump PRs on each tag. See ADR-012 amendment / BUG-002.
    if: false
    steps:
      - uses: actions/checkout@v7
      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51

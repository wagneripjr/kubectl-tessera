name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets
  id-token: write # keyless cosign signing via Fulcio/Rekor OIDC
  packages: write # in case a container image is pushed to GHCR

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so goreleaser computes the version

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # cosign (keyless signing) and syft (SBOM generation) must be on PATH
      # before goreleaser runs — .goreleaser.yaml invokes both.
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  krew:
    name: Update krew-index
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v7
      # Opens the PR to kubernetes-sigs/krew-index using the manifest goreleaser
      # produced for the release. Requires the KREW_PLUGIN_RELEASE_TOKEN secret
      # (a PAT with public_repo scope) so the bot can push the PR branch.
      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51

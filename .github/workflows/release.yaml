name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  krew:
    name: Update krew-index
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v7
      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51

# Deploy the static landing page (site/) to GitHub Pages.
# Source: GitHub Actions (not a branch), so it never collides with the docs/ SDLC tree.
# Enable once: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch: {}

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
